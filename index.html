<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Country Alliances Simulator</title>
        <meta name="description" content="A simulator for managing and exploring country alliances.">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="container">
            <h1>Country Alliances Simulator</h1>
            <p>Based on Ising model proposed by S. Galam for country alliances (Chapter IV of <a href="https://arxiv.org/abs/0803.1800v1" target="_blank">this paper</a>)</p>
        </div>

        <div class="controls">
            <input type="text" id="countryName" placeholder="Add country name (e.g., Spain)">
            <button onclick="addCountry()">Add Country </button>
            <button onclick="randomizeMatrix()">Generate random alliances (G factor)</button>
            <button onclick="uniformMatrix()">Generate uniform alliances (|G<sub>ij</sub>| = G)</button>
            <button onclick="calculateOptimal()">Calculate optimal alliances</button>
        </div>

        <h2>Alliance Matrix (G<sub>i,j</sub>)</h2>
        <div id="matrixContainer">
            <p>Add at least 2 countries to configure geopolitical relations.</p>
        </div>
        
        <div id="resultsContainer" class="results">
            <h2>Optimal result</h2>
            <p id="costOutput"><strong>Minimum total cost: </strong>0</p>
            <div id="allianceContainer">
                <div class="allianceBox">
                    <h3 class="alliance-a-title">Alliance A (State +1)</h3>
                    <ul id="allianceA"></ul>
                </div>
                <div class="allianceBox">
                    <h3 class="alliance-b-title">Alliance B (State -1)</h3>
                    <ul id="allianceB"></ul>
                </div>
            </div>
        </div>

        <script src="js/script.js" async defer></script>
    </body>
</html>
